<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">
  <title>BDM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <img src="icons/icon-48.png" alt="BDM" class="logo" width="28" height="28">
      <h1 class="title">BDM</h1>
    </header>

    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Checking...</span>
    </div>

    <div class="controls">
      <label class="toggle-label">
        <span>Capture Downloads</span>
        <input type="checkbox" id="captureToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" id="openBdm">Open BDM</button>

    <footer class="footer">
      <a href="https://github.com/amirhp-com/BDM-Chrome-Extension" target="_blank">GitHub</a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
